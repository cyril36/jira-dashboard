# ============================================================
# AIgileCoach — OpenShift Manifests (Lite)
# No Jira server, no Hasura — connects to external Jira instance
# Route: http://AIgileCoach.hpr.dev.intranet.groupebpce.net
# ============================================================

# ─── Namespace ───────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: aigilecoach
  labels:
    app.kubernetes.io/part-of: aigilecoach

---
# ─── Secrets ─────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: aigilecoach-secrets
  namespace: aigilecoach
  labels:
    app.kubernetes.io/part-of: aigilecoach
type: Opaque
stringData:
  # Jira credentials (external instance)
  JIRA_EMAIL: ""
  JIRA_API_TOKEN: ""

---
# ─── ConfigMap ───────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: aigilecoach-config
  namespace: aigilecoach
  labels:
    app.kubernetes.io/part-of: aigilecoach
data:
  # External Jira instance
  JIRA_BASE_URL: "https://your-jira-instance.atlassian.net"
  JIRA_BROWSER_URL: "https://your-jira-instance.atlassian.net"
  JIRA_PROJECT_KEY: "TEAM"
  # API
  API_PORT: "3001"
  AI_PROVIDER: "mock"
  CONFIG_DIR: "/data"

---
# ─── PVC for API config persistence ─────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dashboard-config
  namespace: aigilecoach
  labels:
    app.kubernetes.io/part-of: aigilecoach
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

---
# ═════════════════════════════════════════════════════════════
# API Backend
# ═════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: aigilecoach
  labels:
    app: api
    app.kubernetes.io/part-of: aigilecoach
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: aigilecoach-api:latest
          ports:
            - containerPort: 3001
          env:
            - name: JIRA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: aigilecoach-config
                  key: JIRA_BASE_URL
            - name: JIRA_BROWSER_URL
              valueFrom:
                configMapKeyRef:
                  name: aigilecoach-config
                  key: JIRA_BROWSER_URL
            - name: JIRA_PROJECT_KEY
              valueFrom:
                configMapKeyRef:
                  name: aigilecoach-config
                  key: JIRA_PROJECT_KEY
            - name: JIRA_EMAIL
              valueFrom:
                secretKeyRef:
                  name: aigilecoach-secrets
                  key: JIRA_EMAIL
            - name: JIRA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aigilecoach-secrets
                  key: JIRA_API_TOKEN
            - name: API_PORT
              value: "3001"
            - name: AI_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: aigilecoach-config
                  key: AI_PROVIDER
            - name: CONFIG_DIR
              value: "/data"
          volumeMounts:
            - name: config
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /config
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /config
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: dashboard-config

---
apiVersion: v1
kind: Service
metadata:
  name: aigilecoach-api
  namespace: aigilecoach
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - port: 3001
      targetPort: 3001

---
# ═════════════════════════════════════════════════════════════
# Frontend (Next.js)
# ═════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: aigilecoach
  labels:
    app: frontend
    app.kubernetes.io/part-of: aigilecoach
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: aigilecoach-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://aigilecoach-api:3001"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: aigilecoach-frontend
  namespace: aigilecoach
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000

---
# ═════════════════════════════════════════════════════════════
# OpenShift Route — HTTP
# ═════════════════════════════════════════════════════════════

apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: aigilecoach
  namespace: aigilecoach
  labels:
    app: frontend
    app.kubernetes.io/part-of: aigilecoach
  annotations:
    haproxy.router.openshift.io/timeout: 60s
spec:
  host: AIgileCoach.hpr.dev.intranet.groupebpce.net
  port:
    targetPort: 3000
  to:
    kind: Service
    name: aigilecoach-frontend
    weight: 100
