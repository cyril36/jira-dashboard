# ============================================================
# AIgileCoach — OpenShift Manifests (Internal API — external Jira)
# The API is NOT exposed via a Route. Instead, the Next.js frontend
# proxies all API calls to the backend through internal OCP networking.
# The proxy target is configured at runtime via INTERNAL_API_URL env var.
#
# Build & push images (same image for both modes):
#   docker build -t gruion/all:aigilecoach-api -f api/Dockerfile .
#   docker build -t gruion/all:aigilecoach-frontend \
#     --build-arg NEXT_PUBLIC_API_URL="" \
#     ./frontend
#   docker push gruion/all:aigilecoach-api
#   docker push gruion/all:aigilecoach-frontend
# ============================================================

# ─── Namespace ───────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: aigilecoach
  labels:
    app.kubernetes.io/part-of: aigilecoach

---
# ─── PVC for API config persistence ─────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dashboard-config
  namespace: aigilecoach
  labels:
    app.kubernetes.io/part-of: aigilecoach
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

---
# ═════════════════════════════════════════════════════════════
# API Backend (internal only — no Route)
# Reachable inside the cluster at: http://aigilecoach-api:3001
# ═════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: aigilecoach
  labels:
    app: api
    app.kubernetes.io/part-of: aigilecoach
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: gruion/all:aigilecoach-api
          ports:
            - containerPort: 3001
          env:
            - name: API_PORT
              value: "3001"
            - name: CONFIG_DIR
              value: "/data"
          volumeMounts:
            - name: config
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /config/status
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /config/status
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: dashboard-config

---
# ClusterIP Service — internal only, no Route
apiVersion: v1
kind: Service
metadata:
  name: aigilecoach-api
  namespace: aigilecoach
  labels:
    app: api
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 3001
      targetPort: 3001

---
# ═════════════════════════════════════════════════════════════
# Frontend (Next.js) — proxies API calls to internal backend
# INTERNAL_API_URL env var is resolved at container startup
# ═════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: aigilecoach
  labels:
    app: frontend
    app.kubernetes.io/part-of: aigilecoach
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: gruion/all:aigilecoach-frontend
          ports:
            - containerPort: 3000
          env:
            - name: INTERNAL_API_URL
              value: "http://aigilecoach-api:3001"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: aigilecoach-frontend
  namespace: aigilecoach
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000

---
# ═════════════════════════════════════════════════════════════
# OpenShift Route — frontend only (single entry point)
# ═════════════════════════════════════════════════════════════

apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: aigilecoach
  namespace: aigilecoach
  labels:
    app: frontend
    app.kubernetes.io/part-of: aigilecoach
  annotations:
    haproxy.router.openshift.io/timeout: 120s
spec:
  host: aigilecoach.example.com
  port:
    targetPort: 3000
  to:
    kind: Service
    name: aigilecoach-frontend
    weight: 100
